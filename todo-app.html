<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; }
        h1 { text-align: center; }
        #todo-container { max-width: 600px; margin: auto; padding: 20px; background: white; border-radius: 8px; }
        input[type="text"] { width: calc(100% - 50px); padding: 10px; }
        button { padding: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ccc; }
        .completed { text-decoration: line-through; color: gray; }
        .delete { background-color: red; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .complete { background-color: green; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="todo-container">
        <h1>To-Do List</h1>
        <input type="text" id="task-input" placeholder="Add a new task...">
        <button id="add-task">Add Task</button>
        <ul id="task-list"></ul>
    </div>
    <script>
        const taskInput = document.getElementById('task-input');
        const addTaskButton = document.getElementById('add-task');
        const taskList = document.getElementById('task-list');

        // Load tasks from localStorage
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        renderTasks();

        addTaskButton.addEventListener('click', () => {
            if (taskInput.value.trim()) {
                const newTask = { text: taskInput.value, completed: false };
                tasks.push(newTask);
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
                taskInput.value = '';
            }
        });

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="${task.completed ? 'completed' : ''}">${task.text}</span> <button class='complete' onclick='completeTask(${index})'>Complete</button> <button class='delete' onclick='deleteTask(${index})'>Delete</button>`;
                taskList.appendChild(li);
            });
        }

        window.completeTask = function(index) {
            tasks[index].completed = !tasks[index].completed;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        };

        window.deleteTask = function(index) {
            tasks.splice(index, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        };
    </script>
</body>
</html>
